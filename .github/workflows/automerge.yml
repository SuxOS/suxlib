name: Auto-merge

# Enables GitHub NATIVE auto-merge (arms the merge queue) on eligible, trusted-author PRs;
# never force-merges. Uses pull_request_target (base-repo context, write token) but never
# checks out PR code — only reads the event payload and calls the API. Org rulesets
# (SuxOS/.github#669) require only `security-review` fleet-wide — no per-repo CI job is a
# required status check anymore. Don't add a repo-specific job name here without first
# adding it to the org ruleset, or assert-branch-protection refuses to arm (see .github#700).
# Reusable workflow: SuxOS/.github/.github/workflows/automerge.yml

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled, edited]

jobs:
  enable-automerge:
    permissions:
      contents: write
      pull-requests: write
    uses: SuxOS/.github/.github/workflows/automerge.yml@main
    with:
      required-gates: |
        Test & build
    secrets: inherit
