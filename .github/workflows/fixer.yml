name: Fixer

# Proposer stage: scans this repo, files bugs/features as issues with confidence labels.
# Never opens a PR, never queues for build (issue-build.yml decides that). Runs on the
# Claude Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN), not a metered API key.
# Reusable workflow: SuxOS/.github/.github/workflows/fixer.yml
#
# Deep tier of the 3-cadence proposer (see fixer-bugs.yml 15m / fixer-30m.yml 30m).
# Brought up to parity 2026-07-17 with sux/claude-config/.github's 3-tier cadence — this
# repo was previously on a daily deep + hourly-shallow 2-tier pattern, a stale cadence
# left over from before the org standardized the 3-tier design.

on:
  schedule:
    - cron: "17 6 */3 * *" # Fixer Cadence v2: warm-tier every 3rd day ambitious-idea sweep
  workflow_dispatch:

jobs:
  fixer:
    permissions:
      contents: read
      issues: write
      id-token: write
    uses: SuxOS/.github/.github/workflows/fixer.yml@main
    with:
      max-turns: 40
      scope: deep
    secrets: inherit
