name: Issue build

# Collate + build stage: selects buildable open issues directly (eligibility = not-draft AND
# not-hold; no confidence:* taxonomy, no queued-for-build/needs-review lanes — that handoff was
# removed in the three-loop rework), always builds >=1 PR per run, never 0. PRs auto-merge on
# green. Batch schedule replaces per-issue triggering (org budget redesign — see SuxOS/.github
# docs/design/budget-and-cadence.md); workflow_dispatch drains the queue on demand. Runs on the
# Claude Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN). suxlib has no `typecheck`/`lint` npm
# scripts — `npm run build` is `tsc --noEmit`, doubling as the typecheck (see package.json).
# Reusable workflow: SuxOS/.github/.github/workflows/issue-build.yml

on:
  schedule:
    - cron: "51 * * * *" # hourly, offset from sibling repos to spread shared-subscription load
  workflow_dispatch:
  issues:
    types: [labeled]  # event-driven: fires when fixer files a typed issue; reusable concurrency group serializes runs (no Opus fan-out)

jobs:
  issue-build:
    if: github.event_name != 'issues' || contains(fromJSON('["bug","enhancement","documentation"]'), github.event.label.name)
    # Grant exactly what issue-build.yml needs (default token is read-only → reusable would startup-fail).
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    uses: SuxOS/.github/.github/workflows/issue-build.yml@main
    with:
      model-hint: sonnet  # sonnet only, no Opus escalation (operator directive)
      gates-summary: |
        npm test · npm run build (type-check)
    secrets: inherit
